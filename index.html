<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E9EEEE">
<meta name="description" content="Controle de contas, dia a dia e viagens.">
<title>Contas</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icone-180.png">
<link rel="manifest" href="assets/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/estilo.css?v=20260719-7">
<style>[hidden]{display:none!important}</style>
</head>
<body>

<!-- tela de entrada: auth.js desenha aqui dentro -->
<div id="login" hidden></div>

<!-- o app: só aparece com sessão válida -->
<div id="app" hidden>
<header>
  <div class="wrap barra-topo">
    <span id="relogioData">—</span>
    <span class="mono" id="relogioHora">--:--</span>
    <span class="mono relogio-tz" id="relogioTz"></span>
  </div>
  <div class="wrap hd">
    <div class="nav-mes">
      <button id="prev" title="Mês anterior" aria-label="Mês anterior">‹</button>
      <div class="mes-nome"><span id="mesNome">Julho</span><small id="anoNome">2026</small></div>
      <button id="next" title="Próximo mês" aria-label="Próximo mês">›</button>
    </div>
    <div class="hd-stats">
      <div class="hd-stat falta"><b id="hFalta">—</b><span>Falta pagar (Contas Fixas)</span></div>
      <div class="hd-stat quitado"><b id="hPago">—</b><span>Já pago (Contas Fixas)</span></div>
      <div class="hd-stat gastos"><b id="hGastos">—</b><span>Gastos do mês</span></div>
      <div class="hd-stat desemb"><b id="hDesemb">—</b><span>Total desembolsado no mês</span></div>
    </div>
    <div class="moedas" id="moedas"></div>
    <span class="ver" id="ver"></span>
  </div>
</header>

<main class="wrap app-main" id="mainApp">
  <section class="fita">
    <div class="fita-hd">
      <h2 id="fitaTitulo">Vencimentos do mês</h2>
      <em id="fitaLeg">cheio = pago · vazio = a pagar · vermelho = vencido</em>
    </div>
    <div class="dias" id="dias"></div>
  </section>

  <nav class="abas">
    <button class="aba on" data-t="mes">Contas do mês <i id="cMes"></i></button>
    <button class="aba" data-t="painel">Painel</button>
    <button class="aba" data-t="ano">Ano</button>
    <button class="aba" data-t="diario">Dia a dia <i id="cDia"></i></button>
    <button class="aba" data-t="viagem">Viagem</button>
    <button class="aba" data-t="fixos">Fixos <i id="cFix"></i></button>
    <button class="aba" data-t="diagnostico">Diagnóstico</button>
    <button class="aba" data-t="dados">Dados</button>
  </nav>

  <div id="carregando" hidden>Carregando suas contas…</div>
  <div id="tela"></div>
</main>
</div>

<script type="module" src="js/app.js?v=20260719-6"></script>
</body>
</html>
