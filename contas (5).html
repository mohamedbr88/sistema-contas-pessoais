<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E9EEEE; --card:#FFFFFF; --ink:#16262C; --ink-2:#5C7079; --line:#CFD9DA;
  --cofre:#0F6E5C; --cofre-2:#E3F0EC; --carimbo:#B4232A; --carimbo-2:#FBE9E7;
  --azul:#2F4F9E; --amarelo:#B98900;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --disp:'Archivo',var(--sans); --mono:'IBM Plex Mono','SF Mono',ui-monospace,monospace;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.45;
  -webkit-font-smoothing:antialiased;padding:0 0 80px}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--azul);outline-offset:2px;border-radius:4px}

/* ---- topo ---- */
header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
.hd{display:flex;align-items:center;gap:14px;padding:12px 0;flex-wrap:wrap}
.nav-mes{display:flex;align-items:center;gap:2px}
.nav-mes button{width:30px;height:30px;border-radius:6px;color:var(--ink-2);font-size:16px;line-height:1}
.nav-mes button:hover{background:var(--paper);color:var(--ink)}
.mes-nome{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:-.02em;min-width:150px;text-align:center}
.mes-nome small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;color:var(--ink-2);letter-spacing:.08em;text-transform:uppercase;margin-top:-2px}
.hd-stats{margin-left:auto;display:flex;gap:22px}
.hd-stat{text-align:right}
.hd-stat b{display:block;font-family:var(--mono);font-weight:600;font-size:17px;letter-spacing:-.02em}
.hd-stat span{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-2)}
.falta b{color:var(--carimbo)} .quitado b{color:var(--cofre)}

/* ---- fita de vencimentos ---- */
.fita{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin:14px 0;overflow:hidden}
.fita-hd{display:flex;justify-content:space-between;align-items:baseline;padding:11px 14px 9px;border-bottom:1px dashed var(--line)}
.fita-hd h2{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
.fita-hd em{font-style:normal;font-size:11px;color:var(--ink-2)}
.dias{display:flex;gap:3px;padding:12px 14px 10px;overflow-x:auto;scrollbar-width:thin}
.dia{flex:1 0 26px;min-width:26px;display:flex;flex-direction:column;align-items:center;gap:5px;
  border:none;padding:4px 0 5px;border-radius:6px;transition:background .12s}
.dia:hover{background:var(--paper)}
.dia[aria-pressed="true"]{background:#DDE6E4;box-shadow:inset 0 0 0 1px var(--cofre)}
.dia .n{font-family:var(--mono);font-size:10px;color:var(--ink-2);font-variant-numeric:tabular-nums}
.dia.hoje .n{color:var(--azul);font-weight:600}
.barras{display:flex;flex-direction:column-reverse;gap:2px;height:44px;justify-content:flex-start;width:100%;padding:0 3px}
.tick{height:5px;border-radius:1.5px;background:var(--cofre);opacity:.85}
.tick.pend{background:transparent;box-shadow:inset 0 0 0 1.25px var(--ink-2)}
.tick.venc{background:var(--carimbo)}
.dia.hoje{position:relative}
.dia.hoje:after{content:"";position:absolute;left:50%;bottom:-1px;width:5px;height:5px;border-radius:50%;background:var(--azul);transform:translateX(-50%)}

/* ---- abas ---- */
.abas{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px}
.aba{padding:9px 14px;font-family:var(--disp);font-weight:600;font-size:13px;color:var(--ink-2);
  border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.01em}
.aba:hover{color:var(--ink)}
.aba.on{color:var(--ink);border-bottom-color:var(--cofre)}
.aba i{font-style:normal;font-family:var(--mono);font-size:10px;color:var(--ink-2);margin-left:5px}

/* ---- cartões / tabelas ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px}
.card-hd{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.card-hd h3{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}

table{width:100%;border-collapse:collapse}
th{font-family:var(--disp);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-2);text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #EDF1F1;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even){background:#F4F7F7}
tbody tr:hover{background:#E7EFEE}
tr.lin td:first-child{box-shadow:inset 3px 0 0 var(--c)}
tr.lin:hover{background:color-mix(in srgb,var(--c) 7%,#fff)}
.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;white-space:nowrap}
.tot td{border-top:1px solid var(--line);font-weight:600;background:#F2F6F5}

.pill{display:inline-block;padding:1px 7px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.pill-cat{background:var(--paper);color:var(--ink-2)}
.st{font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:5px;letter-spacing:.02em}
.st-pago{background:var(--cofre-2);color:var(--cofre)}
.st-pend{background:var(--paper);color:var(--ink-2);box-shadow:inset 0 0 0 1px var(--line)}
.st-venc{background:var(--carimbo-2);color:var(--carimbo)}
.acao{color:var(--ink-2);font-size:12px;padding:3px 6px;border-radius:5px}
.acao:hover{background:var(--paper);color:var(--ink)}
.acao.del:hover{background:var(--carimbo-2);color:var(--carimbo)}

.btn{background:var(--ink);color:#fff;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:500}
.btn:hover{background:#25404A}
.btn-2{background:var(--card);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line);padding:6px 11px;border-radius:7px;font-size:12.5px}
.btn-2:hover{background:var(--paper)}
.btn-cofre{background:var(--cofre);color:#fff}
.btn-cofre:hover{background:#0C5A4B}
.dir{margin-left:auto;display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* ---- barras por categoria ---- */
.barra{display:grid;grid-template-columns:98px 1fr 82px;align-items:center;gap:10px;padding:5px 14px}
.barra .lab{font-size:12.5px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barra .trilho{height:16px;background:var(--paper);border-radius:3px;overflow:hidden;display:flex}
.barra .fill{background:var(--cofre);opacity:.8}
.barra .fill-p{background:repeating-linear-gradient(45deg,var(--line),var(--line) 3px,transparent 3px,transparent 6px)}
.barra .v{font-family:var(--mono);font-size:12px;text-align:right;font-variant-numeric:tabular-nums}

/* ---- resumo ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line)}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--card);padding:12px 14px}
.kpi span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-2);margin-bottom:3px}
.kpi b{font-family:var(--mono);font-size:19px;font-weight:600;letter-spacing:-.03em}
.kpi small{font-family:var(--mono);font-size:11px;color:var(--ink-2);display:block}

/* ---- filtros ---- */
.filtros{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.filtros input,.filtros select{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12.5px}
.filtros input[type=search]{min-width:140px}

/* ---- modal ---- */
.mask{position:fixed;inset:0;background:rgba(22,38,44,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
@media(min-width:640px){.mask{align-items:center;padding:20px}}
.modal{background:var(--card);border-radius:14px 14px 0 0;width:100%;max-width:460px;max-height:92vh;overflow:auto}
@media(min-width:640px){.modal{border-radius:12px}}
.modal h3{font-family:var(--disp);font-size:15px;padding:14px 16px;border-bottom:1px solid var(--line)}
.campos{padding:14px 16px;display:grid;gap:10px}
.campo{display:grid;gap:3px}
.campo label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2)}
.campo input,.campo select{border:1px solid var(--line);border-radius:7px;padding:8px 9px;background:var(--paper);width:100%}
.campo input:focus,.campo select:focus{background:var(--card)}
.par{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-pe{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--line);background:#FAFCFC;position:sticky;bottom:0}
.vazio{padding:34px 16px;text-align:center;color:var(--ink-2);font-size:13.5px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:9px 16px;border-radius:8px;font-size:13px;z-index:60;box-shadow:0 6px 20px rgba(22,38,44,.25)}
.eur{color:var(--azul)}

/* ---- celular: a lista do mês vira cartões ---- */
@media(max-width:720px){
  .tmes thead{display:none}
  .tmes tfoot .tot td:nth-child(1){grid-area:1/1/2/2}
  .tmes tbody tr,.tmes tfoot tr{
    display:grid;grid-template-columns:1fr auto auto;gap:3px 8px;
    padding:11px 12px 11px 14px;border-bottom:1px solid #E3EAEA;align-items:center}
  .tmes td{border:none;padding:0}
  .tmes tr.lin td:first-child{box-shadow:none}
  .tmes tr.lin{box-shadow:inset 4px 0 0 var(--c)}
  .tmes tbody td:nth-child(2){grid-area:1/1/2/2;font-size:14.5px;line-height:1.25}
  .tmes tbody td:nth-child(6){grid-area:1/2/2/4;text-align:right;font-size:15px}
  .tmes tbody td:nth-child(1){grid-area:2/1/3/2}
  .tmes tbody td:nth-child(7){grid-area:2/2/3/4;text-align:right}
  .tmes tbody td:nth-child(3){grid-area:3/1/4/2}
  .tmes tbody td:nth-child(4){grid-area:3/2/4/3;text-align:right;font-size:11px}
  .tmes tbody td:nth-child(8){grid-area:3/3/4/4;text-align:right}
  .tmes tbody td:nth-child(5){display:none}          /* estimativa: sai no celular */
  .tmes tbody td:nth-child(1):before{content:"vence "}
  .tmes tfoot td:nth-child(2){display:none}
  .tmes tfoot td:nth-child(3){grid-area:1/2/2/4;text-align:right}
  .dia{min-width:22px;flex-basis:22px}
  .hd-stats{gap:14px}
  .mes-nome{min-width:118px;font-size:17px}
  .card-hd{gap:8px}
  .acao{font-size:11px;padding:2px 4px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

let vAno=2026,vMes=7,aba='mes',diaSel=null;
let filtro={q:'',cat:'',loc:'',st:''};
const hojeISO=new Date().toISOString().slice(0,10);

/* ---------- utilidades ---------- */
const R$=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const R$c=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
const EU=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'EUR'});
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dia=t=>+t.data.slice(8,10);
const noMes=(t,a,m)=>t.data.slice(0,7)===`${a}-${String(m).padStart(2,'0')}`;
const vencido=t=>t.st==='Pendente'&&t.data<hojeISO;
const novoId=()=>Math.max(0,...S.tx.map(t=>t.id))+1;
const val=t=>t.st==='Pago'?(t.pago||0):(t.est||0);

function toast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.append(d);
  setTimeout(()=>d.remove(),2200);
}

/* ---------- persistência ---------- */
let salvando=null;
async function salvar(){
  clearTimeout(salvando);
  salvando=setTimeout(async()=>{
    try{ await window.storage.set(CHAVE,JSON.stringify(S)); }
    catch(e){ console.warn('Não consegui salvar:',e); }
  },400);
}
async function carregar(){
  try{
    const r=await window.storage.get(CHAVE);
    if(r&&r.value){const d=JSON.parse(r.value); if(d&&Array.isArray(d.tx)) S=d;}
  }catch(e){ /* primeira vez: usa a base migrada */ }
}

/* ---------- fita de vencimentos ---------- */
function fita(){
  const el=document.getElementById('dias');
  const nd=new Date(vAno,vMes,0).getDate();
  let h='';
  for(let d=1;d<=nd;d++){
    const iso=`${vAno}-${String(vMes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ts=S.tx.filter(t=>t.data===iso);
    const ticks=ts.slice(0,7).map(t=>`<i class="tick ${vencido(t)?'venc':(t.st==='Pago'?'':'pend')}"></i>`).join('');
    h+=`<button class="dia ${iso===hojeISO?'hoje':''}" data-d="${d}" aria-pressed="${diaSel===d}"
        title="${ts.length?ts.length+' conta(s) · '+R$(ts.reduce((s,t)=>s+val(t),0)):'sem contas'}">
        <div class="barras">${ticks}</div><span class="n">${d}</span></button>`;
  }
  el.innerHTML=h;
  el.querySelectorAll('.dia').forEach(b=>b.onclick=()=>{
    const d=+b.dataset.d; diaSel=(diaSel===d?null:d); aba='mes'; render();
  });
}

/* ---------- telas ---------- */
function doMes(){return S.tx.filter(t=>noMes(t,vAno,vMes));}

function telaMes(){
  let ts=doMes();
  if(diaSel) ts=ts.filter(t=>dia(t)===diaSel);
  if(filtro.q){const q=filtro.q.toLowerCase();ts=ts.filter(t=>(t.conta+' '+t.obs).toLowerCase().includes(q));}
  if(filtro.cat) ts=ts.filter(t=>t.cat===filtro.cat);
  if(filtro.loc) ts=ts.filter(t=>t.loc===filtro.loc);
  if(filtro.st) ts=ts.filter(t=>filtro.st==='Vencido'?vencido(t):t.st===filtro.st);
  ts.sort((a,b)=>a.data.localeCompare(b.data)||a.conta.localeCompare(b.conta));

  const linhas=ts.map(t=>`<tr class="lin" style="--c:${cor(t.cat)}">
    <td class="mono" style="font-size:12px;color:var(--ink-2)">${dia(t)}/${String(vMes).padStart(2,'0')}</td>
    <td><b style="font-weight:500">${esc(t.conta)}</b>${t.obs?`<div style="font-size:11px;color:var(--ink-2);margin-top:1px">${esc(t.obs)}</div>`:''}</td>
    <td><span class="pill" style="background:${cor(t.cat)}1A;color:${cor(t.cat)}">${esc(t.cat)}</span></td>
    <td style="font-size:12px;color:var(--ink-2)">${esc(t.loc)}${t.pg?' · '+esc(t.pg):''}</td>
    <td class="num" style="color:var(--ink-2);font-size:12px">${t.est?R$(t.est):'—'}</td>
    <td class="num" style="font-weight:600">${t.pago?R$(t.pago):'—'}</td>
    <td><button class="st ${vencido(t)?'st-venc':(t.st==='Pago'?'st-pago':'st-pend')}" data-toggle="${t.id}"
        title="Marcar como ${t.st==='Pago'?'a pagar':'pago'}">${vencido(t)?'vencido':(t.st==='Pago'?'pago':'a pagar')}</button></td>
    <td style="text-align:right;white-space:nowrap">
      <button class="acao" data-edit="${t.id}">editar</button>
      <button class="acao del" data-del="${t.id}">apagar</button></td>
  </tr>`).join('');

  const somaE=ts.reduce((s,t)=>s+(t.est||0),0), somaP=ts.reduce((s,t)=>s+(t.pago||0),0);
  return `<div class="card">
    <div class="card-hd">
      <div class="filtros">
        <input type="search" id="fq" placeholder="Buscar conta…" value="${esc(filtro.q)}">
        <select id="fcat"><option value="">Toda categoria</option>${CATS.map(c=>`<option ${filtro.cat===c?'selected':''}>${c}</option>`).join('')}</select>
        <select id="floc"><option value="">Todo local</option>${LOCS.map(c=>`<option ${filtro.loc===c?'selected':''}>${c}</option>`).join('')}</select>
        <select id="fst"><option value="">Todo status</option>${['Pago','Pendente','Vencido'].map(c=>`<option ${filtro.st===c?'selected':''}>${c}</option>`).join('')}</select>
        ${diaSel?`<button class="btn-2" id="limpaDia">dia ${diaSel} ✕</button>`:''}
      </div>
      <div class="dir"><button class="btn" id="add">+ Nova conta</button></div>
    </div>
    ${ts.length?`<table class="tmes"><thead><tr><th>Venc.</th><th>Conta</th><th>Categoria</th><th>Local · Pgto</th>
      <th class="num">Estimado</th><th class="num">Pago</th><th>Status</th><th></th></tr></thead>
      <tbody>${linhas}</tbody>
      <tfoot><tr class="tot"><td colspan="4">${ts.length} conta${ts.length>1?'s':''}</td>
        <td class="num">${R$(somaE)}</td><td class="num">${R$(somaP)}</td><td colspan="2"></td></tr></tfoot></table>`
      :`<div class="vazio">Nenhuma conta com esses filtros.<br><br><button class="btn" id="add2">+ Nova conta</button></div>`}
  </div>`;
}

function telaPainel(){
  const ts=doMes();
  const est=ts.reduce((s,t)=>s+(t.est||0),0), pago=ts.reduce((s,t)=>s+(t.pago||0),0);
  const pend=ts.filter(t=>t.st==='Pendente').reduce((s,t)=>s+(t.est||0),0);
  const venc=ts.filter(vencido);
  const grupo=(campo,lista)=>lista.map(k=>{
    const g=ts.filter(t=>t[campo]===k);
    return {k, e:g.reduce((s,t)=>s+(t.est||0),0), p:g.reduce((s,t)=>s+(t.pago||0),0)};
  }).filter(g=>g.e||g.p).sort((a,b)=>(b.p+b.e)-(a.p+a.e));
  const barras=(g,campo)=>{const max=Math.max(...g.map(x=>Math.max(x.p,x.e)),1);
    return g.map(x=>`<div class="barra"><div class="lab" title="${esc(x.k)}">${esc(x.k)}</div>

/* ---------- eventos ---------- */
function liga(){
  const $=s=>document.getElementById(s), on=(id,ev,fn)=>{const e=$(id);if(e)e[ev]=fn;};
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{
    const t=S.tx.find(x=>x.id==b.dataset.toggle);
    if(t.st==='Pago'){t.st='Pendente';t.pago=0;} else {t.st='Pago'; if(!t.pago)t.pago=t.est||0;}
    salvar();render();
  });
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>form(S.tx.find(x=>x.id==b.dataset.edit)));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const t=S.tx.find(x=>x.id==b.dataset.del);
    if(confirm(`Apagar "${t.conta}" de ${dia(t)}/${vMes}?`)){S.tx=S.tx.filter(x=>x.id!=t.id);salvar();render();toast('Conta apagada');}
  });
  on('add','onclick',()=>form(null)); on('add2','onclick',()=>form(null));
  on('limpaDia','onclick',()=>{diaSel=null;render();});
  on('fq','oninput',e=>{filtro.q=e.target.value;const p=e.target.selectionStart;render();
    const n=$('fq');if(n){n.focus();n.setSelectionRange(p,p);}});
  ['fcat','floc','fst'].forEach(id=>on(id,'onchange',e=>{filtro[id.slice(1)]=e.target.value;render();}));
  on('selAno','onchange',e=>{vAno=+e.target.value;render();});
  on('cambio','onchange',e=>{S.cambio=+e.target.value||1;salvar();render();toast('Câmbio atualizado');});
  document.querySelectorAll('[data-fx]').forEach(c=>c.onchange=()=>{S.fixos[c.dataset.fx].ativo=c.checked;salvar();render();});
  document.querySelectorAll('[data-fxdel]').forEach(b=>b.onclick=()=>{
    if(confirm(`Tirar "${S.fixos[b.dataset.fxdel].conta}" das fixas?`)){S.fixos.splice(b.dataset.fxdel,1);salvar();render();}
  });
  on('gerar','onclick',gerarMes);
  on('gerarAno','onclick',gerarAno);
  on('impExt','onclick',()=>$('impExtFile').click());
  on('impExtFile','onchange',e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const buf=r.result;
        let txt=new TextDecoder('utf-8').decode(buf);
        if(txt.includes('\uFFFD')) txt=new TextDecoder('windows-1252').decode(buf);
        abrirImport(txt, f.name);
      }
      catch(err){ toast('Não consegui ler esse arquivo — tente o OFX'); console.warn(err); }
      e.target.value='';
    };
    r.readAsArrayBuffer(f);
  });
  on('expJson','onclick',()=>baixar(`contas-backup-${hojeISO}.json`,JSON.stringify(S,null,1),'application/json'));
  on('expCsv','onclick',expCsv);
  on('impBtn','onclick',()=>$('impFile').click());
  on('impFile','onchange',e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);
      if(!d.tx)throw 0;
      if(confirm(`Restaurar ${d.tx.length} lançamentos? Isso substitui o que está aqui.`)){S=d;salvar();render();toast('Backup restaurado');}
    }catch(_){toast('Arquivo inválido — use um backup .json deste app');}};
    r.readAsText(f);
  });
}

function lancarFixos(ano,mes){
  const chave=`${ano}-${String(mes).padStart(2,'0')}`;
  const tem=new Set(S.tx.filter(t=>t.data.slice(0,7)===chave).map(t=>t.conta.toLowerCase()));
  const nd=new Date(ano,mes,0).getDate();
  return S.fixos.filter(f=>f.ativo&&!tem.has(f.conta.toLowerCase())).map(f=>({
    id:0,data:`${chave}-${String(Math.min(f.dia,nd)).padStart(2,'0')}`,
    conta:f.conta,cat:f.cat,loc:f.loc,pg:f.pg,est:f.est,pago:0,st:'Pendente',obs:''}));
}
function empurrar(novos){ let id=novoId(); novos.forEach(n=>n.id=id++); S.tx.push(...novos); salvar(); }
function gerarMes(){
  const novos=lancarFixos(vAno,vMes);
  if(!novos.length){toast('Todas as fixas já estão lançadas neste mês');return;}
  empurrar(novos); aba='mes'; diaSel=null; render();
  toast(`${novos.length} conta(s) lançadas em ${MESES[vMes-1]}`);
}
function gerarAno(){
  let novos=[], meses=0;
  for(let m=vMes;m<=12;m++){ const n=lancarFixos(vAno,m); if(n.length){meses++; novos.push(...n);} }
  if(!novos.length){toast(`De ${MESES[vMes-1]} a dezembro já está tudo lançado`);return;}
  if(!confirm(`Lançar ${novos.length} contas a pagar em ${meses} mês(es), de ${MESES[vMes-1]} a dezembro de ${vAno}?\n\nTodas entram como "a pagar", com valor pago zerado. Você edita depois.`)) return;
  empurrar(novos); aba='mes'; diaSel=null; render();
  toast(`${novos.length} contas lançadas até dezembro`);
}

/* ---------- importar fatura / extrato ---------- */
const REGRAS=[
  [/netflix|spotif|hbo|max |disney|prime video|apple\.com|apple one|itunes|openai|chatgpt|claude|anthropic|linkedin|adobe|starlink|google one|youtube/i,'Assinaturas'],
  [/uber|99app|99 |cabify|posto|ipiranga|shell|petrobr|combust|estacion|zona azul|pedagio|sem parar/i,'Transporte'],
  [/unimed|drogaria|farmac|droga ?raia|pacheco|panvel|hospital|laborat|clinica|dentist/i,'Saúde'],
  [/vivo|claro|tim |oi fixo|telefon|celular/i,'Telefone'],
  [/net |vivo fibra|internet|banda larga|fibra/i,'Internet'],
  [/enel|cpfl|elektro|cemig|copel|light|energia|eletric/i,'Energia'],
  [/condomin/i,'Condomínio'],
  [/aluguel|imobiliar/i,'Aluguel'],
  [/darf|das |imposto|receita federal|iptu|ipva|prefeitura|tribut/i,'Impostos'],
  [/mercado ?livre|meli|amazon|magalu|americanas|shopee|aliexpress|shein|loja|magazine/i,'Compras'],
  [/rotary|associac|clube|sindicat/i,'Associações'],
  [/contabil|contador|escritorio/i,'Contabilidade'],
  [/pag ?fatura|pagamento (de )?fatura|pagamento recebido|estorno|credito de|rendimento|transferencia recebida/i,'__CREDITO__'],
];
function adivinha(desc){
  for(const [re,cat] of REGRAS) if(re.test(desc)) return cat;
  return 'Outros';
}
function parseOFX(t){
  const out=[];
  const blocos=t.split(/<STMTTRN>/i).slice(1);
  for(const b of blocos){
    const g=re=>{const m=b.match(re);return m?m[1].trim():'';};
    const d=g(/<DTPOSTED>\s*([0-9]{8})/i);
    const v=g(/<TRNAMT>\s*(-?[0-9.,]+)/i);
    const n=g(/<MEMO>\s*([^<\r\n]+)/i)||g(/<NAME>\s*([^<\r\n]+)/i);
    if(!d||!v) continue;
    // OFX padrão usa ponto decimal; alguns bancos BR mandam vírgula
    const num = v.includes(',') ? v.replace(/\./g,'').replace(',','.') : v;
    const f=parseFloat(num); if(isNaN(f)) continue;
    out.push({data:`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`,desc:n||'(sem descrição)',valor:f});
  }
  return out;
}
function parseCSV(t){
  const linhas=t.split(/\r?\n/).filter(l=>l.trim());
  if(!linhas.length) return [];
  const sep=[',',';','\t'].sort((a,b)=>linhas[0].split(b).length-linhas[0].split(a).length)[0];
  const corta=l=>{const o=[];let c='',q=false;
    for(let i=0;i<l.length;i++){const x=l[i];
      if(x==='"'){ if(q&&l[i+1]==='"'){c+='"';i++;} else q=!q; }
      else if(x===sep&&!q){o.push(c);c='';} else c+=x;}
    o.push(c);return o.map(s=>s.trim().replace(/^"|"$/g,''));};
  const cab=corta(linhas[0]).map(h=>h.toLowerCase());
  const ache=(...alvos)=>cab.findIndex(h=>alvos.some(a=>h.includes(a)));
  const iD=ache('data','date'), iV=ache('valor','amount','value','montante'),
        iT=ache('descri','title','memo','estabelec','lançamento','lancamento','historico','histórico');
  if(iD<0||iV<0) throw new Error('sem coluna de data ou valor');
  const out=[];
  for(const l of linhas.slice(1)){
    const c=corta(l); if(c.length<2) continue;
    let d=c[iD]; 
    if(/^\d{2}\/\d{2}\/\d{4}/.test(d)) d=d.slice(0,10).split('/').reverse().join('-');
    else if(/^\d{4}-\d{2}-\d{2}/.test(d)) d=d.slice(0,10); else continue;
    let v=c[iV].replace(/[R$\s]/g,'');
    v = v.includes(',') ? v.replace(/\./g,'').replace(',','.') : v;
    const n=parseFloat(v); if(isNaN(n)) continue;
    out.push({data:d,desc:(iT>=0?c[iT]:'')||'(sem descrição)',valor:n});
  }
  return out;
}
function abrirImport(txt,nome){
  const ofx=/<OFX|<STMTTRN/i.test(txt);
  let itens = ofx?parseOFX(txt):parseCSV(txt);
  if(!itens.length){toast('Não achei lançamentos nesse arquivo');return;}
  // gasto = valor negativo no OFX; no CSV alguns bancos usam positivo pra despesa
  const temNeg=itens.some(i=>i.valor<0);
  itens=itens.map(i=>({...i, gasto: temNeg? -i.valor : i.valor}));
  const dup=i=>S.tx.some(t=>t.data===i.data && Math.abs((t.pago||0)-i.gasto)<0.005);
  itens=itens.map(i=>({...i, cat:adivinha(i.desc), dup:dup(i)}))
             .filter(i=>i.gasto>0)  // só saídas
             .sort((a,b)=>a.data.localeCompare(b.data));
  if(!itens.length){toast('Só achei entradas/créditos nesse arquivo');return;}
  itens.forEach(i=>{ i.on = !i.dup && i.cat!=='__CREDITO__'; if(i.cat==='__CREDITO__') i.cat='Outros'; });

  const m=document.createElement('div');m.className='mask';
  const total=()=>itens.filter(i=>i.on).reduce((s,i)=>s+i.gasto,0);
  m.innerHTML=`<div class="modal" role="dialog" aria-modal="true" style="max-width:720px">
    <h3>Conferir importação <span style="font-weight:400;color:var(--ink-2);font-size:12px">· ${esc(nome)}</span></h3>
    <div class="campos" style="gap:8px">
      <div class="par">
        <div class="campo"><label>Lançar como pagamento</label><select id="i_pg">${PAGS.map(c=>`<option value="${c}">${c||'—'}</option>`).join('')}</select></div>
        <div class="campo"><label>Local de todos</label><select id="i_loc">${LOCS.map(c=>`<option ${c==='Pessoal'?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <p style="font-size:12px;color:var(--ink-2)">${itens.length} saída(s) encontrada(s)${itens.filter(i=>i.dup).length?` · <b style="color:var(--carimbo)">${itens.filter(i=>i.dup).length} já parecem estar lançadas</b> e vieram desmarcadas`:''}. Ajuste a categoria de cada uma se eu errei.</p>
    </div>
    <div style="max-height:46vh;overflow:auto;border-top:1px solid var(--line)">
      <table><tbody id="i_lista">${itens.map((i,n)=>`<tr style="${i.dup?'background:var(--carimbo-2)':''}">
        <td style="width:30px"><input type="checkbox" data-i="${n}" ${i.on?'checked':''} aria-label="Incluir"></td>
        <td class="mono" style="width:64px;font-size:11px;color:var(--ink-2)">${i.data.slice(8)}/${i.data.slice(5,7)}</td>
        <td style="font-size:12.5px">${esc(i.desc)}${i.dup?'<div style="font-size:10px;color:var(--carimbo)">já existe uma conta desse valor nesse dia</div>':''}</td>
        <td style="width:130px"><select data-c="${n}" style="font-size:11px;padding:2px 4px;border:1px solid var(--line);border-radius:5px;background:var(--paper)">
          ${CATS.map(c=>`<option ${i.cat===c?'selected':''}>${c}</option>`).join('')}</select></td>
        <td class="num" style="width:88px;font-weight:600">${R$(i.gasto)}</td></tr>`).join('')}
      </tbody></table>
    </div>
    <div class="modal-pe"><button class="btn btn-cofre" id="i_ok" style="flex:1">Lançar <span id="i_n">${itens.filter(i=>i.on).length}</span> · <span id="i_t">${R$(total())}</span></button>
      <button class="btn-2" id="i_x">Cancelar</button></div></div>`;
  document.body.append(m);
  const g=id=>m.querySelector('#'+id);
  const atual=()=>{g('i_n').textContent=itens.filter(i=>i.on).length;g('i_t').textContent=R$(total());};
  m.querySelectorAll('[data-i]').forEach(c=>c.onchange=()=>{itens[c.dataset.i].on=c.checked;atual();});
  m.querySelectorAll('[data-c]').forEach(s=>s.onchange=()=>{itens[s.dataset.c].cat=s.value;});
  const fechar=()=>m.remove();
  g('i_x').onclick=fechar; m.onclick=e=>{if(e.target===m)fechar();};
  m.addEventListener('keydown',e=>{if(e.key==='Escape')fechar();});
  g('i_ok').onclick=()=>{
    const sel=itens.filter(i=>i.on);
    if(!sel.length){toast('Marque pelo menos uma');return;}
    let id=novoId();
    S.tx.push(...sel.map(i=>({id:id++,data:i.data,conta:i.desc.slice(0,60),cat:i.cat,loc:g('i_loc').value,
      pg:g('i_pg').value,est:i.gasto,pago:i.gasto,st:'Pago',obs:`importado de ${nome}`})));
    salvar();fechar();
    vAno=+sel[0].data.slice(0,4); vMes=+sel[0].data.slice(5,7); aba='mes'; diaSel=null;
    render(); toast(`${sel.length} lançamento(s) importados`);
  };
}

/* ---------- formulário ---------- */
function form(t){
  const novo=!t;
  t=t||{id:0,data:`${vAno}-${String(vMes).padStart(2,'0')}-${String(diaSel||new Date().getDate()).padStart(2,'0')}`,
        conta:'',cat:'Outros',loc:'Pessoal',pg:'',est:0,pago:0,st:'Pendente',obs:''};
  const m=document.createElement('div');m.className='mask';
  m.innerHTML=`<div class="modal" role="dialog" aria-modal="true">
    <h3>${novo?'Nova conta':'Editar conta'}</h3>
    <div class="campos">
      <div class="campo"><label>Conta</label><input id="f_conta" value="${esc(t.conta)}" placeholder="Ex.: Luz chácara" autofocus></div>
      <div class="par">
        <div class="campo"><label>Vencimento</label><input type="date" id="f_data" value="${t.data}"></div>
        <div class="campo"><label>Status</label><select id="f_st">
          <option ${t.st==='Pendente'?'selected':''}>Pendente</option><option ${t.st==='Pago'?'selected':''}>Pago</option></select></div>
      </div>
      <div class="par">
        <div class="campo"><label>Estimativa (R$)</label><input type="number" step="0.01" id="f_est" value="${t.est||''}"></div>
        <div class="campo"><label>Pago (R$)</label><input type="number" step="0.01" id="f_pago" value="${t.pago||''}"></div>
      </div>
      <div class="par">
        <div class="campo"><label>Categoria</label><select id="f_cat">${CATS.map(c=>`<option ${t.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="campo"><label>Local</label><select id="f_loc">${LOCS.map(c=>`<option ${t.loc===c?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div class="campo"><label>Pagamento</label><select id="f_pg">${PAGS.map(c=>`<option value="${c}" ${t.pg===c?'selected':''}>${c||'—'}</option>`).join('')}</select></div>
      <div class="campo"><label>Obs</label><input id="f_obs" value="${esc(t.obs)}"></div>
      ${novo?`<label style="font-size:12.5px;display:flex;gap:7px;align-items:center;color:var(--ink-2)">
        <input type="checkbox" id="f_fix"> Repetir todo mês (adicionar às fixas)</label>`:''}
    </div>
    <div class="modal-pe"><button class="btn" id="f_ok" style="flex:1">${novo?'Adicionar':'Salvar'}</button>
      <button class="btn-2" id="f_x">Cancelar</button></div></div>`;
  document.body.append(m);
  const g=id=>m.querySelector('#'+id);
  const fechar=()=>m.remove();
  m.onclick=e=>{if(e.target===m)fechar();};
  g('f_x').onclick=fechar;
  m.addEventListener('keydown',e=>{if(e.key==='Escape')fechar();});
  g('f_ok').onclick=()=>{
    const n=g('f_conta').value.trim();
    if(!n){g('f_conta').focus();toast('Dá um nome pra conta');return;}
    const o={id:t.id||novoId(),data:g('f_data').value,conta:n,cat:g('f_cat').value,loc:g('f_loc').value,
      pg:g('f_pg').value,est:+g('f_est').value||0,pago:+g('f_pago').value||0,st:g('f_st').value,obs:g('f_obs').value.trim()};
    if(o.st==='Pago'&&!o.pago) o.pago=o.est;
    if(o.st==='Pendente') o.pago=0;
    if(novo){S.tx.push(o); if(g('f_fix')&&g('f_fix').checked)
      S.fixos.push({conta:o.conta,dia:+o.data.slice(8,10),cat:o.cat,loc:o.loc,pg:o.pg,est:o.est,ativo:true});}
    else Object.assign(S.tx.find(x=>x.id===t.id),o);
    salvar();fechar();render();toast(novo?'Conta adicionada':'Conta salva');
  };
  setTimeout(()=>g('f_conta').focus(),40);
}

/* ---------- início ---------- */
document.getElementById('prev').onclick=()=>{vMes--;if(vMes<1){vMes=12;vAno--;}diaSel=null;render();};
document.getElementById('next').onclick=()=>{vMes++;if(vMes>12){vMes=1;vAno++;}diaSel=null;render();};
document.querySelectorAll('.aba').forEach(b=>b.onclick=()=>{aba=b.dataset.t;render();});
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,select,textarea'))return;
  if(e.key==='ArrowLeft')document.getElementById('prev').click();
  if(e.key==='ArrowRight')document.getElementById('next').click();
});
(async()=>{ await carregar(); render(); })();
</script>
